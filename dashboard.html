<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f5f3ff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 紫色/琥珀色主题 */
        :root {
            --primary: #8B5CF6;
            --primary-light: #A78BFA;
            --primary-dark: #7C3AED;
            --success: #F59E0B;
            --danger: #EF4444;
            --danger-light: #FEE2E2;
            --bg: #ffffff;
            --text: #1F2937;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2rem;
            font-weight: 600;
            font-size: 2rem;
            border-left: 6px solid var(--primary);
            padding-left: 1rem;
        }

        /* 表单卡片 */
        .form-card {
            background: var(--bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: #E07B0A;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #DC2626;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: #F9FAFB;
        }

        /* 课程卡片网格 */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .course-card {
            background: var(--bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .course-header h3 {
            font-size: 1.25rem;
            color: var(--primary-dark);
            word-break: break-word;
            margin-right: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #FEF3C7;
            color: #92400E;
        }

        .status-badge.in-progress {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .status-badge.completed {
            background: #D1FAE5;
            color: #065F46;
        }

        .course-description {
            color: #4B5563;
            margin: 1rem 0;
            line-height: 1.5;
            flex: 1;
            word-break: break-word;
        }

        .course-meta {
            font-size: 0.9rem;
            color: #6B7280;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .course-meta span {
            background: #F3F4F6;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .course-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .course-actions button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: modalFadeIn 0.2s;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            color: var(--text);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #9CA3AF;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* 加载指示器 */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        /* 消息提示 */
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message.success {
            background: #FEF3C7;
            color: #92400E;
            border-left: 4px solid var(--success);
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        .message .close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: inherit;
            opacity: 0.7;
        }

        .message .close:hover {
            opacity: 1;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #9CA3AF;
            font-style: italic;
            background: white;
            border-radius: 12px;
            border: 1px dashed var(--border);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .form-card { padding: 1.5rem; }
            .courses-grid { grid-template-columns: 1fr; }
            .course-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 CodeCraftHub: Your Learning Management Platform</h1>

        <!-- 消息提示区域 -->
        <div id="messageContainer"></div>

        <!-- 添加课程表单 -->
        <div class="form-card">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--primary-dark);">Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Course Name *</label>
                        <input type="text" id="name" required placeholder="e.g. Python Basics">
                    </div>
                    <div class="form-group">
                        <label for="target_date">Target Date *</label>
                        <input type="date" id="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label for="description">Description *</label>
                    <textarea id="description" required placeholder="Learn Python fundamentals including variables, loops, and functions"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="addBtn" style="margin-top: 1.5rem;">
                    <span id="addBtnText">Add Course</span>
                    <span id="addSpinner" class="spinner" style="display: none;"></span>
                </button>
            </form>
        </div>

        <!-- 课程列表区域 -->
        <div id="coursesContainer">
            <div class="loading-overlay" id="loadingCourses">
                <div class="spinner"></div>
                <span style="margin-left: 0.5rem;">Loading courses...</span>
            </div>
            <!-- 动态生成的课程卡片将插入这里 -->
            <div id="coursesList" class="courses-grid" style="display: none;"></div>
            <div id="emptyState" class="empty-state" style="display: none;">No courses yet. Add one above!</div>
        </div>
    </div>

    <!-- 编辑课程模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Course</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editCourseForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label for="editName">Course Name *</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editDescription">Description *</label>
                        <textarea id="editDescription" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status *</label>
                        <select id="editStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelEdit">Cancel</button>
                <button class="btn btn-success" id="saveEdit">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL
        const API_BASE = 'http://localhost:5000/api/courses';

        // 全局状态
        let courses = [];
        let currentEditId = null;

        // DOM 元素
        const messageContainer = document.getElementById('messageContainer');
        const loadingCourses = document.getElementById('loadingCourses');
        const coursesList = document.getElementById('coursesList');
        const emptyState = document.getElementById('emptyState');
        const addForm = document.getElementById('addCourseForm');
        const addBtn = document.getElementById('addBtn');
        const addBtnText = document.getElementById('addBtnText');
        const addSpinner = document.getElementById('addSpinner');
        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editCourseForm');
        const editId = document.getElementById('editId');
        const editName = document.getElementById('editName');
        const editDescription = document.getElementById('editDescription');
        const editTargetDate = document.getElementById('editTargetDate');
        const editStatus = document.getElementById('editStatus');
        const closeModal = document.getElementById('closeModal');
        const cancelEdit = document.getElementById('cancelEdit');
        const saveEdit = document.getElementById('saveEdit');

        // 辅助函数：显示消息
        function showMessage(message, type = 'success', autoClose = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <span>${message}</span>
                <button class="close">&times;</button>
            `;
            messageContainer.innerHTML = '';
            messageContainer.appendChild(msgDiv);
            msgDiv.querySelector('.close').addEventListener('click', () => {
                msgDiv.remove();
            });
            if (autoClose) {
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                }, 5000);
            }
        }

        // 加载所有课程
        async function fetchCourses() {
            try {
                loadingCourses.style.display = 'flex';
                coursesList.style.display = 'none';
                emptyState.style.display = 'none';

                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();
                courses = data.courses || [];
                renderCourses();
            } catch (error) {
                console.error('Fetch error:', error);
                showMessage('Failed to load courses. Is the backend running?', 'error');
                coursesList.innerHTML = ''; // 清空可能旧的卡片
                coursesList.style.display = 'none';
                emptyState.style.display = 'block';
            } finally {
                loadingCourses.style.display = 'none';
            }
        }

        // 渲染课程卡片
        function renderCourses() {
            if (courses.length === 0) {
                coursesList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            coursesList.style.display = 'grid';
            coursesList.innerHTML = courses.map(course => {
                // 格式化日期
                const createdDate = course.created_at ? new Date(course.created_at).toLocaleDateString() : 'N/A';
                // 状态样式
                let statusClass = '';
                if (course.status === 'In Progress') statusClass = 'in-progress';
                else if (course.status === 'Completed') statusClass = 'completed';
                // 转义 HTML 防止 XSS
                const safeName = escapeHtml(course.name || '');
                const safeDesc = escapeHtml(course.description || '');
                const safeTarget = escapeHtml(course.target_date || '');
                const safeStatus = escapeHtml(course.status || 'Not Started');
                return `
                    <div class="course-card" data-id="${course.id}">
                        <div class="course-header">
                            <h3>${safeName}</h3>
                            <span class="status-badge ${statusClass}">${safeStatus}</span>
                        </div>
                        <p class="course-description">${safeDesc}</p>
                        <div class="course-meta">
                            <span>🎯 Target: ${safeTarget}</span>
                            <span>📅 Created: ${createdDate}</span>
                        </div>
                        <div class="course-actions">
                            <button class="btn btn-outline edit-btn">Edit</button>
                            <button class="btn btn-danger delete-btn">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');

            // 为每个编辑/删除按钮添加事件监听
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.course-card');
                    const id = parseInt(card.dataset.id);
                    openEditModal(id);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.course-card');
                    const id = parseInt(card.dataset.id);
                    deleteCourse(id);
                });
            });
        }

        // 简单的 HTML 转义
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"']/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return '&#039;';
            });
        }

        // 添加课程
        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            const target_date = document.getElementById('target_date').value;
            const status = document.getElementById('status').value;

            if (!name || !description || !target_date || !status) {
                showMessage('All fields are required!', 'error');
                return;
            }

            const payload = { name, description, target_date, status };

            // 禁用按钮，显示加载
            addBtn.disabled = true;
            addBtnText.style.display = 'none';
            addSpinner.style.display = 'inline-block';

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add course');
                }
                showMessage('Course added successfully!', 'success');
                addForm.reset();
                // 重新获取课程列表
                await fetchCourses();
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                addBtn.disabled = false;
                addBtnText.style.display = 'inline';
                addSpinner.style.display = 'none';
            }
        });

        // 打开编辑模态框
        function openEditModal(id) {
            const course = courses.find(c => c.id === id);
            if (!course) return;
            currentEditId = id;
            editId.value = course.id;
            editName.value = course.name || '';
            editDescription.value = course.description || '';
            editTargetDate.value = course.target_date || '';
            editStatus.value = course.status || 'Not Started';
            editModal.classList.add('active');
        }

        // 关闭模态框
        function closeEditModal() {
            editModal.classList.remove('active');
            currentEditId = null;
        }

        closeModal.addEventListener('click', closeEditModal);
        cancelEdit.addEventListener('click', closeEditModal);
        window.addEventListener('click', (e) => {
            if (e.target === editModal) closeEditModal();
        });

        // 保存编辑
        saveEdit.addEventListener('click', async () => {
            const name = editName.value.trim();
            const description = editDescription.value.trim();
            const target_date = editTargetDate.value;
            const status = editStatus.value;

            if (!name || !description || !target_date || !status) {
                showMessage('All fields are required!', 'error');
                return;
            }

            const payload = {};
            if (name) payload.name = name;
            if (description) payload.description = description;
            if (target_date) payload.target_date = target_date;
            if (status) payload.status = status;

            // 禁用保存按钮（简单起见我们直接用样式）
            saveEdit.disabled = true;
            const originalText = saveEdit.textContent;
            saveEdit.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;"></span> Saving...';

            try {
                const response = await fetch(`${API_BASE}/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to update course');
                }
                showMessage('Course updated successfully!', 'success');
                closeEditModal();
                await fetchCourses();
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                saveEdit.disabled = false;
                saveEdit.textContent = originalText;
            }
        });

        // 删除课程
        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) return;
            try {
                const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to delete course');
                }
                showMessage('Course deleted successfully!', 'success');
                await fetchCourses();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        // 初始化：加载课程
        fetchCourses();
    </script>
</body>
</html>
